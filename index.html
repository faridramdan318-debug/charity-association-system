<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>نظام العطاء · الوضع الداكن المتطور</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ========== متغيرات الألوان الداكنة ========== */
        :root {
            --bg-primary: #0a0f1e;
            --bg-secondary: #141b2b;
            --bg-card: #1e2639;
            --bg-hover: #2a3348;
            --text-primary: #ffffff;
            --text-secondary: #b0b9d0;
            --text-muted: #7e88a3;
            --accent: #6366f1;
            --accent-light: #8183f4;
            --accent-dark: #4f46e5;
            --success: #10b981;
            --success-dark: #059669;
            --warning: #f59e0b;
            --warning-dark: #d97706;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --info: #3b82f6;
            --border: #2d374b;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --shadow-sm: 0 10px 20px -8px rgba(0, 0, 0, 0.4);
            --glow: 0 0 30px rgba(99, 102, 241, 0.3);
            --radius: 30px;
            --radius-sm: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(16, 185, 129, 0.15) 0%, transparent 50%);
            z-index: -2;
            animation: gradientMove 20s ease infinite;
        }

        /* جزيئات متحركة */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            animation: particleMove 30s linear infinite;
            opacity: 0.3;
        }

        @keyframes gradientMove {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        @keyframes particleMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50px); }
        }

        /* الهيدر المتحرك */
        .header {
            background: rgba(20, 27, 43, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.3);
            padding: 20px 30px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-3d {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: white;
            transform: rotate(10deg);
            box-shadow: var(--glow);
            animation: logoFloat 3s ease infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: rotate(10deg) translateY(0); }
            50% { transform: rotate(10deg) translateY(-10px); }
        }

        .logo-text h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .logo-text p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* التبويبات */
        .tabs-3d {
            display: flex;
            gap: 15px;
            background: rgba(30, 38, 57, 0.5);
            padding: 10px;
            border-radius: 60px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
        }

        .tab-btn-3d {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-btn-3d:hover {
            color: white;
            transform: translateY(-3px);
        }

        .tab-btn-3d.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            box-shadow: 0 10px 30px -10px var(--accent);
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 25px;
        }

        /* الأقسام */
        .tab-section {
            display: none;
            animation: sectionFade 0.8s ease;
        }

        .tab-section.active {
            display: block;
        }

        @keyframes sectionFade {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== بطاقة الإجمالي ========== */
        .total-card-3d {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border-radius: var(--radius);
            padding: 35px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .total-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 30px;
        }

        .total-info {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .total-icon-3d {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            color: white;
            transform: rotate(5deg);
            box-shadow: var(--glow);
        }

        .total-text h2 {
            color: var(--text-secondary);
            font-size: 1.2rem;
            font-weight: normal;
            margin-bottom: 5px;
        }

        .total-text .total-number {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .total-badge-3d {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 20px 40px;
            border-radius: 60px;
            font-size: 1.3rem;
            color: var(--text-secondary);
        }

        /* ========== بطاقة الإضافة ========== */
        .add-card-3d {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border-radius: var(--radius);
            padding: 35px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .add-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .add-title i {
            font-size: 2.5rem;
            color: var(--accent);
        }

        .add-title h3 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-grid-3d {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .input-3d {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        .input-3d:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
        }

        .btn-3d {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none;
            border-radius: 20px;
            padding: 18px 35px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .btn-3d:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -15px var(--accent);
        }

        /* ========== شبكة العناصر ========== */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin: 30px 0;
        }

        .item-card-3d {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border-radius: 30px;
            padding: 25px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            position: relative;
        }

        .item-card-3d:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow);
            border-color: var(--accent);
        }

        .item-card-3d.low-stock {
            border-color: var(--danger);
            animation: dangerPulse 1.5s infinite;
        }

        @keyframes dangerPulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .item-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .item-icon-3d {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: white;
            transform: rotate(-5deg);
            box-shadow: var(--glow);
        }

        .item-info h4 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .item-info .unit {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .item-quantity {
            text-align: center;
            margin: 20px 0;
        }

        .quantity-number {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .quantity-label {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .item-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .control-btn-3d {
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .control-btn-3d:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            color: white;
        }

        .control-btn-3d.add:hover {
            background: var(--success);
            border-color: var(--success);
        }

        .control-btn-3d.remove:hover {
            background: var(--warning);
            border-color: var(--warning);
        }

        .control-btn-3d.delete:hover {
            background: var(--danger);
            border-color: var(--danger);
        }

        .warning-badge-3d {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--danger);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* ========== سجل الحركات ========== */
        .movements-card-3d {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border-radius: var(--radius);
            padding: 35px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            margin-top: 30px;
        }

        .movements-list {
            max-height: 350px;
            overflow-y: auto;
            padding: 10px;
        }

        .movement-item-3d {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 4px solid var(--success);
        }

        .movement-item-3d.remove {
            border-right-color: var(--warning);
        }

        .movement-item-3d.delete {
            border-right-color: var(--danger);
        }

        /* ========== قسم المستفيدين ========== */
        .beneficiaries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .beneficiary-card-3d {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border-radius: 30px;
            padding: 25px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }

        .beneficiary-card-3d:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow);
            border-color: var(--accent);
        }

        .beneficiary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }

        .beneficiary-name {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .beneficiary-status {
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status-critical {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        .status-high {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            border: 1px solid #f59e0b;
        }

        .status-medium {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            border: 1px solid #3b82f6;
        }

        .status-low {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid #10b981;
        }

        .beneficiary-info {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
        }

        .info-row i {
            width: 25px;
            color: var(--accent);
        }

        .beneficiary-condition {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            border-right: 3px solid var(--accent);
        }

        .beneficiary-helps {
            margin: 15px 0;
        }

        .help-item-small {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .beneficiary-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .action-btn-3d {
            padding: 12px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .action-btn-3d:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            color: white;
        }

        .action-btn-3d.help:hover {
            background: var(--success);
        }

        .action-btn-3d.edit:hover {
            background: var(--info);
        }

        .action-btn-3d.delete:hover {
            background: var(--danger);
        }

        /* ========== المودالات ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border-radius: var(--radius);
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .modal-header {
            padding: 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            color: white;
        }

        .close-modal {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-modal:hover {
            background: var(--danger);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 25px;
        }

        /* ========== توست ========== */
        .toast-3d {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border-left: 4px solid var(--success);
            border-radius: 60px;
            padding: 18px 35px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 3000;
            animation: toastSlide 0.5s ease;
            border: 1px solid var(--border);
        }

        @keyframes toastSlide {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ========== ريسponsive ========== */
        @media (max-width: 1024px) {
            .total-content {
                flex-direction: column;
                text-align: center;
            }
            
            .total-info {
                flex-direction: column;
            }
        }

        @media (max-width: 768px) {
            .items-grid, .beneficiaries-grid {
                grid-template-columns: 1fr;
            }
            
            .header-content {
                flex-direction: column;
            }
            
            .tabs-3d {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- الهيدر -->
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-3d">
                    <i class="fas fa-hand-holding-heart"></i>
                </div>
                <div class="logo-text">
                    <h1>منصة العطاء</h1>
                    <p>النظام المتكامل · المخزن والمستفيدين</p>
                </div>
            </div>
            
            <div class="tabs-3d">
                <button class="tab-btn-3d active" onclick="switchTab('store')">
                    <i class="fas fa-warehouse"></i>
                    المخزن
                </button>
                <button class="tab-btn-3d" onclick="switchTab('beneficiaries')">
                    <i class="fas fa-users"></i>
                    المستفيدين
                </button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- ========== قسم المخزن ========== -->
        <div id="storeSection" class="tab-section active">
            <!-- بطاقة الإجمالي -->
            <div class="total-card-3d">
                <div class="total-content">
                    <div class="total-info">
                        <div class="total-icon-3d">
                            <i class="fas fa-boxes"></i>
                        </div>
                        <div class="total-text">
                            <h2>إجمالي أصناف المخزن</h2>
                            <div class="total-number" id="totalItems">٠</div>
                        </div>
                    </div>
                    <div class="total-badge-3d">
                        <i class="fas fa-weight-scale"></i>
                        إجمالي الوحدات: <span id="totalUnits">٠</span>
                    </div>
                </div>
            </div>

            <!-- إضافة سلعة -->
            <div class="add-card-3d">
                <div class="add-title">
                    <i class="fas fa-plus-circle"></i>
                    <h3>إضافة سلعة جديدة</h3>
                </div>
                <div class="form-grid-3d">
                    <input type="text" class="input-3d" id="itemName" placeholder="اسم السلعة">
                    <input type="number" class="input-3d" id="itemQuantity" placeholder="الكمية">
                    <select class="input-3d" id="itemUnit">
                        <option value="كيلو">كيلو</option>
                        <option value="رغيف">رغيف</option>
                        <option value="قطعة">قطعة</option>
                        <option value="زجاجة">زجاجة</option>
                        <option value="كرتونة">كرتونة</option>
                    </select>
                    <button class="btn-3d" onclick="addNewItem()">
                        <i class="fas fa-save"></i>
                        إضافة
                    </button>
                </div>
            </div>

            <!-- عناصر المخزن -->
            <div id="itemsGrid" class="items-grid"></div>

            <!-- سجل الحركات -->
            <div class="movements-card-3d">
                <div class="add-title">
                    <i class="fas fa-history"></i>
                    <h3>آخر الحركات</h3>
                </div>
                <div id="movementsList" class="movements-list"></div>
            </div>
        </div>

        <!-- ========== قسم المستفيدين ========== -->
        <div id="beneficiariesSection" class="tab-section">
            <!-- إحصائيات المستفيدين -->
            <div class="total-card-3d">
                <div class="total-content">
                    <div class="total-info">
                        <div class="total-icon-3d">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="total-text">
                            <h2>إجمالي المستفيدين</h2>
                            <div class="total-number" id="totalBeneficiaries">٠</div>
                        </div>
                    </div>
                    <div class="total-badge-3d">
                        <i class="fas fa-gift"></i>
                        إجمالي المساعدات: <span id="totalHelps">٠</span>
                    </div>
                </div>
            </div>

            <!-- إضافة مستفيد -->
            <div class="add-card-3d">
                <div class="add-title">
                    <i class="fas fa-user-plus"></i>
                    <h3>إضافة مستفيد جديد</h3>
                </div>
                <button class="btn-3d" onclick="openAddBeneficiaryModal()" style="width: auto; padding: 18px 40px; margin: 0 auto;">
                    <i class="fas fa-plus"></i>
                    إضافة مستفيد
                </button>
            </div>

            <!-- شبكة المستفيدين -->
            <div id="beneficiariesGrid" class="beneficiaries-grid"></div>
        </div>
    </div>

    <!-- ========== مودال إضافة/تعديل مستفيد ========== -->
    <div id="beneficiaryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"><i class="fas fa-user-plus"></i> إضافة مستفيد</h2>
                <div class="close-modal" onclick="closeModal('beneficiaryModal')">
                    <i class="fas fa-times"></i>
                </div>
            </div>
            <div class="modal-body">
                <form onsubmit="saveBeneficiary(event)">
                    <input type="hidden" id="beneficiaryId">
                    
                    <div class="form-grid-3d" style="grid-template-columns: 1fr;">
                        <input type="text" class="input-3d" id="beneficiaryName" placeholder="الاسم الكامل" required>
                        <input type="text" class="input-3d" id="beneficiaryPhone" placeholder="رقم الموبايل" required>
                        <input type="text" class="input-3d" id="beneficiaryAddress" placeholder="العنوان" required>
                        
                        <select class="input-3d" id="beneficiaryStatus">
                            <option value="critical">🔴 عاجل جداً</option>
                            <option value="high">🟠 يحتاج مساعدة</option>
                            <option value="medium">🟡 متابعة دورية</option>
                            <option value="low">🟢 حالة مستقرة</option>
                        </select>
                        
                        <textarea class="input-3d" id="beneficiaryCondition" rows="3" placeholder="وصف الحالة بالتفصيل" required></textarea>
                        <textarea class="input-3d" id="beneficiaryNotes" rows="2" placeholder="ملاحظات إضافية"></textarea>
                    </div>
                    
                    <button type="submit" class="btn-3d" style="margin-top: 20px;">
                        <i class="fas fa-save"></i>
                        حفظ المستفيد
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- ========== مودال إضافة مساعدة ========== -->
    <div id="helpModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-gift"></i> إضافة مساعدة</h2>
                <div class="close-modal" onclick="closeModal('helpModal')">
                    <i class="fas fa-times"></i>
                </div>
            </div>
            <div class="modal-body">
                <form onsubmit="addHelp(event)">
                    <input type="hidden" id="helpBeneficiaryId">
                    
                    <div class="form-grid-3d" style="grid-template-columns: 1fr;">
                        <div id="helpItemsContainer" class="items-checkbox-group" style="max-height: 300px; overflow-y: auto; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 15px;">
                            <!-- هتتعبأ بالجافاسكريبت -->
                        </div>
                        
                        <input type="date" class="input-3d" id="helpDate" required>
                        <textarea class="input-3d" id="helpNotes" rows="2" placeholder="ملاحظات"></textarea>
                    </div>
                    
                    <button type="submit" class="btn-3d" style="margin-top: 20px;">
                        <i class="fas fa-gift"></i>
                        تسجيل المساعدة
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- ========== مودال عرض المساعدات ========== -->
    <div id="viewHelpsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-history"></i> <span id="viewHelpsName"></span></h2>
                <div class="close-modal" onclick="closeModal('viewHelpsModal')">
                    <i class="fas fa-times"></i>
                </div>
            </div>
            <div class="modal-body">
                <div id="viewHelpsList" style="max-height: 400px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        // ========== البيانات ==========
        let inventory = [];
        let movements = [];
        let beneficiaries = [];
        let helps = [];

        // تحميل البيانات
        function loadData() {
            const savedInventory = localStorage.getItem('inventory_complete');
            const savedMovements = localStorage.getItem('movements_complete');
            const savedBeneficiaries = localStorage.getItem('beneficiaries_complete');
            const savedHelps = localStorage.getItem('helps_complete');
            
            if (savedInventory) inventory = JSON.parse(savedInventory);
            if (savedMovements) movements = JSON.parse(savedMovements);
            if (savedBeneficiaries) beneficiaries = JSON.parse(savedBeneficiaries);
            if (savedHelps) helps = JSON.parse(savedHelps);

            // بيانات افتراضية للمخزن
            if (inventory.length === 0) {
                inventory = [
                    { id: '1', name: 'لحمه', quantity: 5, unit: 'كيلو', icon: 'drumstick-bite' },
                    { id: '2', name: 'روز', quantity: 5, unit: 'كيلو', icon: 'bowl-food' },
                    { id: '3', name: 'بيضا', quantity: 30, unit: 'قطعة', icon: 'egg' },
                    { id: '4', name: 'عيش', quantity: 50, unit: 'رغيف', icon: 'bread-slice' },
                    { id: '5', name: 'زيت', quantity: 10, unit: 'زجاجة', icon: 'oil-can' }
                ];
                saveData();
            }

            // بيانات افتراضية للمستفيدين
            if (beneficiaries.length === 0) {
                beneficiaries = [
                    {
                        id: 'b1',
                        name: 'فريد رمضان',
                        phone: '٠١٢٣٤٥٦٧٨٩',
                        address: 'شارع النصر - القاهرة',
                        status: 'critical',
                        condition: 'أسرة مكونة من ٥ أفراد بحاجة لمساعدات غذائية',
                        notes: 'حالة عاجلة'
                    },
                    {
                        id: 'b2',
                        name: 'أحمد حسن',
                        phone: '٠١٢٣٤٥٦٧٨٠',
                        address: 'مدينة نصر - القاهرة',
                        status: 'medium',
                        condition: 'أسرة مكونة من ٣ أفراد',
                        notes: 'متابعة دورية'
                    }
                ];
                saveData();
            }
        }

        // حفظ البيانات
        function saveData() {
            localStorage.setItem('inventory_complete', JSON.stringify(inventory));
            localStorage.setItem('movements_complete', JSON.stringify(movements));
            localStorage.setItem('beneficiaries_complete', JSON.stringify(beneficiaries));
            localStorage.setItem('helps_complete', JSON.stringify(helps));
        }

        // ========== دوال مساعدة ==========
        function formatNumber(num) {
            return num.toLocaleString('ar-EG');
        }

        function getHelpsForBeneficiary(beneficiaryId) {
            return helps.filter(h => h.beneficiaryId === beneficiaryId);
        }

        // ========== دوال المخزن ==========
        function renderInventory() {
            const grid = document.getElementById('itemsGrid');
            if (!grid) return;

            updateTotals();

            if (inventory.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 60px;">المخزن فارغ</div>';
                return;
            }

            grid.innerHTML = inventory.map(item => `
                <div class="item-card-3d ${item.quantity <= 2 ? 'low-stock' : ''}">
                    ${item.quantity <= 2 ? '<div class="warning-badge-3d">⚠️ مخزون منخفض</div>' : ''}
                    
                    <div class="item-header">
                        <div class="item-icon-3d">
                            <i class="fas fa-${item.icon || 'box'}"></i>
                        </div>
                        <div class="item-info">
                            <h4>${item.name}</h4>
                            <div class="unit">${item.unit}</div>
                        </div>
                    </div>

                    <div class="item-quantity">
                        <div class="quantity-number">${item.quantity}</div>
                        <div class="quantity-label">${item.unit}</div>
                    </div>

                    <div class="item-controls">
                        <button class="control-btn-3d add" onclick="updateQuantity('${item.id}', 1)">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button class="control-btn-3d remove" onclick="updateQuantity('${item.id}', -1)">
                            <i class="fas fa-minus"></i>
                        </button>
                        <button class="control-btn-3d delete" onclick="deleteItem('${item.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            renderMovements();
        }

        function updateTotals() {
            document.getElementById('totalItems').innerHTML = formatNumber(inventory.length);
            document.getElementById('totalUnits').innerHTML = formatNumber(inventory.reduce((s, i) => s + i.quantity, 0));
        }

        function renderMovements() {
            const container = document.getElementById('movementsList');
            if (!container) return;

            if (movements.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted);">لا توجد حركات</p>';
                return;
            }

            container.innerHTML = movements.slice(-15).reverse().map(m => `
                <div class="movement-item-3d ${m.type === 'خصم' ? 'remove' : m.type === 'حذف' ? 'delete' : ''}">
                    <div>
                        <strong>${m.type}</strong>
                        <div style="color: var(--text-secondary);">${m.item}: ${m.quantity} ${m.unit}</div>
                    </div>
                    <div style="color: var(--text-muted);">${m.date}</div>
                </div>
            `).join('');
        }

        function addNewItem() {
            const name = document.getElementById('itemName').value.trim();
            const quantity = parseFloat(document.getElementById('itemQuantity').value);
            const unit = document.getElementById('itemUnit').value;

            if (!name || !quantity) {
                showToast('⚠️ الرجاء إدخال البيانات', 'warning');
                return;
            }

            const existing = inventory.find(i => i.name === name);
            if (existing) {
                existing.quantity += quantity;
                movements.push({ date: new Date().toLocaleDateString(), type: 'إضافة', item: name, quantity, unit, note: 'إضافة' });
            } else {
                inventory.push({ id: Date.now().toString(), name, quantity, unit, icon: getItemIcon(name) });
                movements.push({ date: new Date().toLocaleDateString(), type: 'إضافة', item: name, quantity, unit, note: 'جديد' });
            }

            saveData();
            renderInventory();
            showToast(`✅ تم إضافة ${name}`);
            
            document.getElementById('itemName').value = '';
            document.getElementById('itemQuantity').value = '';
        }

        function updateQuantity(id, change) {
            const item = inventory.find(i => i.id === id);
            if (!item) return;

            const newQty = item.quantity + change;
            if (newQty < 0) {
                showToast(`⚠️ الكمية غير كافية`, 'warning');
                return;
            }

            item.quantity = newQty;
            movements.push({
                date: new Date().toLocaleDateString(),
                type: change > 0 ? 'إضافة' : 'خصم',
                item: item.name,
                quantity: Math.abs(change),
                unit: item.unit
            });

            saveData();
            renderInventory();
        }

        function deleteItem(id) {
            const item = inventory.find(i => i.id === id);
            if (confirm(`⚠️ حذف ${item.name}؟`)) {
                inventory = inventory.filter(i => i.id !== id);
                movements.push({ date: new Date().toLocaleDateString(), type: 'حذف', item: item.name, quantity: item.quantity, unit: item.unit });
                saveData();
                renderInventory();
                showToast(`✅ تم حذف ${item.name}`);
            }
        }

        function getItemIcon(name) {
            const icons = { 'لحمه': 'drumstick-bite', 'روز': 'bowl-food', 'بيضا': 'egg', 'عيش': 'bread-slice', 'زيت': 'oil-can', 'فراخ': 'drumstick' };
            for (let key in icons) if (name.includes(key)) return icons[key];
            return 'box';
        }

        // ========== دوال المستفيدين ==========
        function renderBeneficiaries() {
            const grid = document.getElementById('beneficiariesGrid');
            if (!grid) return;

            document.getElementById('totalBeneficiaries').innerHTML = formatNumber(beneficiaries.length);
            document.getElementById('totalHelps').innerHTML = formatNumber(helps.length);

            if (beneficiaries.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 60px;">لا يوجد مستفيدين</div>';
                return;
            }

            grid.innerHTML = beneficiaries.map(b => {
                const bHelps = getHelpsForBeneficiary(b.id);
                return `
                    <div class="beneficiary-card-3d">
                        <div class="beneficiary-header">
                            <span class="beneficiary-name">${b.name}</span>
                            <span class="beneficiary-status status-${b.status}">${getStatusText(b.status)}</span>
                        </div>
                        
                        <div class="beneficiary-info">
                            <div class="info-row"><i class="fas fa-phone"></i> ${b.phone}</div>
                            <div class="info-row"><i class="fas fa-map-marker-alt"></i> ${b.address}</div>
                        </div>

                        <div class="beneficiary-condition">
                            <i class="fas fa-heartbeat" style="color: var(--accent); margin-left: 8px;"></i>
                            ${b.condition}
                        </div>

                        ${bHelps.length > 0 ? `
                            <div class="beneficiary-helps">
                                <h4 style="margin-bottom: 10px;">آخر المساعدات</h4>
                                ${bHelps.slice(0, 2).map(h => `
                                    <div class="help-item-small">
                                        <span>${h.items.map(i => i.name).join('، ')}</span>
                                        <span style="color: var(--success);">${h.date}</span>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}

                        <div class="beneficiary-actions">
                            <button class="action-btn-3d help" onclick="openHelpModal('${b.id}')">
                                <i class="fas fa-gift"></i> مساعدة
                            </button>
                            <button class="action-btn-3d edit" onclick="openEditBeneficiaryModal('${b.id}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="action-btn-3d delete" onclick="deleteBeneficiary('${b.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getStatusText(status) {
            const texts = { critical: '🔴 عاجل', high: '🟠 خطير', medium: '🟡 متوسط', low: '🟢 مستقر' };
            return texts[status] || '🟡 متوسط';
        }

        // ========== مودالات المستفيدين ==========
        function openAddBeneficiaryModal() {
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus"></i> إضافة مستفيد';
            document.getElementById('beneficiaryId').value = '';
            document.getElementById('beneficiaryName').value = '';
            document.getElementById('beneficiaryPhone').value = '';
            document.getElementById('beneficiaryAddress').value = '';
            document.getElementById('beneficiaryStatus').value = 'medium';
            document.getElementById('beneficiaryCondition').value = '';
            document.getElementById('beneficiaryNotes').value = '';
            document.getElementById('beneficiaryModal').classList.add('active');
        }

        function openEditBeneficiaryModal(id) {
            const b = beneficiaries.find(b => b.id === id);
            if (!b) return;

            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-edit"></i> تعديل بيانات';
            document.getElementById('beneficiaryId').value = b.id;
            document.getElementById('beneficiaryName').value = b.name;
            document.getElementById('beneficiaryPhone').value = b.phone;
            document.getElementById('beneficiaryAddress').value = b.address;
            document.getElementById('beneficiaryStatus').value = b.status;
            document.getElementById('beneficiaryCondition').value = b.condition;
            document.getElementById('beneficiaryNotes').value = b.notes || '';
            document.getElementById('beneficiaryModal').classList.add('active');
        }

        function saveBeneficiary(e) {
            e.preventDefault();

            const id = document.getElementById('beneficiaryId').value;
            const data = {
                name: document.getElementById('beneficiaryName').value,
                phone: document.getElementById('beneficiaryPhone').value,
                address: document.getElementById('beneficiaryAddress').value,
                status: document.getElementById('beneficiaryStatus').value,
                condition: document.getElementById('beneficiaryCondition').value,
                notes: document.getElementById('beneficiaryNotes').value
            };

            if (id) {
                const index = beneficiaries.findIndex(b => b.id === id);
                if (index !== -1) {
                    beneficiaries[index] = { ...beneficiaries[index], ...data };
                    showToast('✅ تم التعديل');
                }
            } else {
                beneficiaries.push({ id: Date.now().toString(), ...data });
                showToast('✅ تم الإضافة');
            }

            saveData();
            renderBeneficiaries();
            closeModal('beneficiaryModal');
        }

        function deleteBeneficiary(id) {
            if (confirm('⚠️ حذف المستفيد؟')) {
                beneficiaries = beneficiaries.filter(b => b.id !== id);
                helps = helps.filter(h => h.beneficiaryId !== id);
                saveData();
                renderBeneficiaries();
                showToast('✅ تم الحذف');
            }
        }

        // ========== دوال المساعدات ==========
        function openHelpModal(beneficiaryId) {
            document.getElementById('helpBeneficiaryId').value = beneficiaryId;
            document.getElementById('helpDate').value = new Date().toISOString().split('T')[0];
            
            const container = document.getElementById('helpItemsContainer');
            container.innerHTML = inventory.map(item => `
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px;">
                    <input type="checkbox" id="helpItem_${item.id}" value="${item.id}">
                    <label for="helpItem_${item.id}" style="flex: 1;">${item.name} (${item.quantity} ${item.unit})</label>
                    <input type="number" id="helpQty_${item.id}" class="input-3d" placeholder="الكمية" min="1" max="${item.quantity}" style="width: 100px; padding: 8px;">
                </div>
            `).join('');

            document.getElementById('helpModal').classList.add('active');
        }

        function addHelp(e) {
            e.preventDefault();

            const beneficiaryId = document.getElementById('helpBeneficiaryId').value;
            const date = document.getElementById('helpDate').value;
            const notes = document.getElementById('helpNotes').value;

            const selectedItems = [];
            inventory.forEach(item => {
                const checkbox = document.getElementById(`helpItem_${item.id}`);
                const qtyInput = document.getElementById(`helpQty_${item.id}`);
                
                if (checkbox && checkbox.checked && qtyInput && qtyInput.value) {
                    const qty = parseFloat(qtyInput.value);
                    if (qty > 0 && qty <= item.quantity) {
                        item.quantity -= qty;
                        selectedItems.push({ id: item.id, name: item.name, quantity: qty, unit: item.unit });
                        
                        movements.push({
                            date: date,
                            type: 'خصم',
                            item: item.name,
                            quantity: qty,
                            unit: item.unit,
                            note: `مساعدة لـ ${beneficiaries.find(b => b.id === beneficiaryId)?.name}`
                        });
                    }
                }
            });

            if (selectedItems.length > 0) {
                helps.push({
                    id: Date.now().toString(),
                    beneficiaryId,
                    date,
                    items: selectedItems,
                    notes
                });

                saveData();
                renderInventory();
                renderBeneficiaries();
                closeModal('helpModal');
                showToast('✅ تم تسجيل المساعدة');
            } else {
                showToast('⚠️ اختر المواد', 'warning');
            }
        }

        // ========== دوال عامة ==========
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn-3d').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
            
            if (tab === 'store') {
                document.querySelectorAll('.tab-btn-3d')[0].classList.add('active');
                document.getElementById('storeSection').classList.add('active');
                renderInventory();
            } else {
                document.querySelectorAll('.tab-btn-3d')[1].classList.add('active');
                document.getElementById('beneficiariesSection').classList.add('active');
                renderBeneficiaries();
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast-3d';
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}" style="color: ${type === 'success' ? 'var(--success)' : 'var(--warning)'};"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ========== بدء التشغيل ==========
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            renderInventory();
            renderBeneficiaries();
        });
    </script>
</body>
</html>
