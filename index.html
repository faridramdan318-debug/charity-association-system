<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>نظام العطاء · نسخة مبسطة</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0a0f1e;
            --bg-secondary: #141b2b;
            --bg-card: #1e2639;
            --text-primary: #ffffff;
            --text-secondary: #b0b9d0;
            --accent: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --purple: #8b5cf6;
            --border: #2d374b;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --radius: 30px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* الهيدر */
        .header {
            background: rgba(20, 27, 43, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 20px 30px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-3d {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
        }

        .logo-text h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* التبويبات */
        .tabs {
            display: flex;
            gap: 10px;
            background: rgba(30, 38, 57, 0.5);
            padding: 5px;
            border-radius: 50px;
        }

        .tab-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 25px;
        }

        .tab-section {
            display: none;
        }

        .tab-section.active {
            display: block;
        }

        /* البطاقات */
        .card {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border-radius: var(--radius);
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .card-title i {
            color: var(--accent);
        }

        /* الجداول */
        .table-container {
            overflow-x: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(99, 102, 241, 0.2);
            padding: 15px;
            text-align: right;
            font-weight: 700;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* النماذج */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        input, select, textarea {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            color: white;
            font-size: 1rem;
            width: 100%;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            border: none;
            border-radius: 15px;
            padding: 15px 25px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -10px var(--accent);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #dc2626);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #d97706);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
        }

        .btn-purple {
            background: linear-gradient(135deg, var(--purple), #7c3aed);
        }

        /* شارات */
        .badge {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .badge-purple {
            background: rgba(139, 92, 246, 0.2);
            color: var(--purple);
            border: 1px solid var(--purple);
        }

        /* شبكة المستفيدين */
        .beneficiaries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .beneficiary-card {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            position: relative;
        }

        .beneficiary-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .beneficiary-id {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .beneficiary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            margin-top: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .beneficiary-name {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .beneficiary-info {
            display: grid;
            gap: 8px;
            margin: 15px 0;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
        }

        .info-row i {
            width: 20px;
            color: var(--accent);
        }

        .beneficiary-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 15px;
        }

        .action-btn {
            padding: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .action-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* البحث */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 1;
            min-width: 250px;
        }

        /* المودال */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 25px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .close:hover {
            background: var(--danger);
        }

        /* التوست */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-card);
            border-right: 4px solid var(--success);
            border-radius: 50px;
            padding: 15px 30px;
            box-shadow: var(--shadow);
            z-index: 3000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-3d">
                    <i class="fas fa-hand-holding-heart"></i>
                </div>
                <div class="logo-text">
                    <h1>منصة العطاء</h1>
                </div>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('store')">
                    <i class="fas fa-warehouse"></i>
                    المخزن
                </button>
                <button class="tab-btn" onclick="switchTab('beneficiaries')">
                    <i class="fas fa-users"></i>
                    المستفيدين
                </button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- ===== قسم المخزن ===== -->
        <div id="storeSection" class="tab-section active">
            <!-- إحصائيات سريعة -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <i class="fas fa-boxes" style="font-size: 40px; color: var(--accent);"></i>
                        <div>
                            <h2 style="color: var(--text-secondary);">إجمالي الأصناف</h2>
                            <span style="font-size: 3rem; font-weight: 800;" id="totalItems">0</span>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <i class="fas fa-weight-scale" style="font-size: 40px; color: var(--success);"></i>
                        <div>
                            <h2 style="color: var(--text-secondary);">إجمالي الوحدات</h2>
                            <span style="font-size: 3rem; font-weight: 800;" id="totalUnits">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- إضافة سلعة جديدة -->
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-plus-circle"></i>
                    <h3>إضافة سلعة جديدة</h3>
                </div>
                <div class="form-grid">
                    <input type="text" id="itemName" placeholder="اسم السلعة">
                    <input type="number" id="itemQuantity" placeholder="الكمية">
                    <select id="itemUnit">
                        <option value="كيلو">كيلو</option>
                        <option value="قطعة">قطعة</option>
                        <option value="شنطة">شنطة</option>
                        <option value="كرتونة">كرتونة</option>
                    </select>
                    <button onclick="addNewItem()">
                        <i class="fas fa-save"></i>
                        إضافة
                    </button>
                </div>
            </div>

            <!-- جدول المخزن -->
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-table"></i>
                    <h3>جميع المواد في المخزن</h3>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>الاسم</th>
                                <th>الكمية</th>
                                <th>الوحدة</th>
                                <th>النوع</th>
                                <th>الحالة</th>
                                <th>التحكم</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTable"></tbody>
                    </table>
                </div>
            </div>

            <!-- سجل الحركات -->
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-history"></i>
                    <h3>آخر الحركات</h3>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>التاريخ</th>
                                <th>النوع</th>
                                <th>المادة</th>
                                <th>الكمية</th>
                                <th>الوحدة</th>
                                <th>ملاحظات</th>
                            </tr>
                        </thead>
                        <tbody id="movementsTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ===== قسم المستفيدين ===== -->
        <div id="beneficiariesSection" class="tab-section">
            <!-- إحصائيات المستفيدين -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <i class="fas fa-users" style="font-size: 40px; color: var(--accent);"></i>
                        <div>
                            <h2 style="color: var(--text-secondary);">إجمالي المستفيدين</h2>
                            <span style="font-size: 3rem; font-weight: 800;" id="totalBeneficiaries">0</span>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <i class="fas fa-gift" style="font-size: 40px; color: var(--success);"></i>
                        <div>
                            <h2 style="color: var(--text-secondary);">إجمالي المساعدات</h2>
                            <span style="font-size: 3rem; font-weight: 800;" id="totalHelps">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- إضافة مستفيد -->
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-user-plus"></i>
                    <h3>إضافة مستفيد جديد</h3>
                </div>
                <button class="btn-success" onclick="openAddBeneficiaryModal()" style="width: auto;">
                    <i class="fas fa-plus"></i>
                    إضافة مستفيد
                </button>
            </div>

            <!-- البحث -->
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-search"></i>
                    <h3>بحث عن مستفيد</h3>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="ابحث بالاسم أو المحافظة أو رقم البطاقة...">
                    <select id="helpFilter">
                        <option value="all">الكل</option>
                        <option value="helped">تم صرف مساعدة</option>
                        <option value="not-helped">لم يصرف</option>
                    </select>
                    <button onclick="applySearch()">
                        <i class="fas fa-filter"></i>
                        بحث
                    </button>
                    <button class="btn-warning" onclick="resetSearch()">
                        <i class="fas fa-redo"></i>
                        إعادة
                    </button>
                </div>
            </div>

            <!-- شبكة المستفيدين -->
            <div id="beneficiariesGrid" class="beneficiaries-grid"></div>
        </div>
    </div>

    <!-- مودال إضافة/تعديل مستفيد -->
    <div id="beneficiaryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">إضافة مستفيد</h2>
                <div class="close" onclick="closeModal('beneficiaryModal')">✕</div>
            </div>
            <form onsubmit="saveBeneficiary(event)">
                <input type="hidden" id="beneficiaryId">
                
                <div class="form-grid" style="grid-template-columns: 1fr;">
                    <input type="text" id="beneficiaryName" placeholder="الاسم الكامل" required>
                    <input type="text" id="beneficiaryNationalId" placeholder="رقم البطاقة" required>
                    <input type="tel" id="beneficiaryPhone" placeholder="رقم الموبايل" required>
                    <input type="text" id="beneficiaryGovernorate" placeholder="المحافظة" required>
                    <input type="text" id="beneficiaryAddress" placeholder="العنوان" required>
                    
                    <select id="beneficiaryStatus" required>
                        <option value="critical">عاجل جداً</option>
                        <option value="high">يحتاج مساعدة</option>
                        <option value="medium">متابعة دورية</option>
                        <option value="low">حالة مستقرة</option>
                    </select>
                    
                    <textarea id="beneficiaryCondition" rows="3" placeholder="وصف الحالة" required></textarea>
                    <textarea id="beneficiaryNotes" rows="2" placeholder="ملاحظات"></textarea>
                </div>
                
                <button type="submit" style="width: 100%; margin-top: 20px;">
                    <i class="fas fa-save"></i>
                    حفظ
                </button>
            </form>
        </div>
    </div>

    <!-- مودال صرف مساعدة -->
    <div id="helpModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>صرف مساعدة</h2>
                <div class="close" onclick="closeModal('helpModal')">✕</div>
            </div>
            <form onsubmit="addHelp(event)">
                <input type="hidden" id="helpBeneficiaryId">
                
                <div style="max-height: 300px; overflow-y: auto; margin: 20px 0;" id="helpItemsList">
                    <!-- هنا تظهر المواد -->
                </div>
                
                <input type="date" id="helpDate" class="input-3d" required>
                <textarea id="helpNotes" rows="2" placeholder="ملاحظات" style="margin: 10px 0;"></textarea>
                
                <button type="submit" style="width: 100%;">
                    <i class="fas fa-gift"></i>
                    صرف المساعدة
                </button>
            </form>
        </div>
    </div>

    <script>
        // ========== البيانات ==========
        let inventory = []; // كل المواد في المخزن
        let movements = [];
        let beneficiaries = [];
        let helps = [];

        // تحميل البيانات
        function loadData() {
            inventory = JSON.parse(localStorage.getItem('inventory')) || [];
            movements = JSON.parse(localStorage.getItem('movements')) || [];
            beneficiaries = JSON.parse(localStorage.getItem('beneficiaries')) || [];
            helps = JSON.parse(localStorage.getItem('helps')) || [];

            // بيانات افتراضية
            if (inventory.length === 0) {
                inventory = [
                    { id: '1', name: 'لحمة', quantity: 50, unit: 'كيلو', type: 'غذاء' },
                    { id: '2', name: 'أرز', quantity: 100, unit: 'كيلو', type: 'غذاء' },
                    { id: '3', name: 'شنطة رمضان', quantity: 30, unit: 'شنطة', type: 'موسمي' },
                    { id: '4', name: 'زيت', quantity: 40, unit: 'زجاجة', type: 'غذاء' }
                ];
                saveData();
            }

            if (beneficiaries.length === 0) {
                beneficiaries = [
                    { id: generateId(), name: 'فريد رمضان', nationalId: '123456789', phone: '0123456789', governorate: 'القاهرة', address: 'شارع النصر', status: 'critical', condition: 'حالة عاجلة', notes: '' }
                ];
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem('inventory', JSON.stringify(inventory));
            localStorage.setItem('movements', JSON.stringify(movements));
            localStorage.setItem('beneficiaries', JSON.stringify(beneficiaries));
            localStorage.setItem('helps', JSON.stringify(helps));
        }

        function generateId() {
            return 'ID-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
        }

        // ========== دوال المخزن ==========
        function renderInventory() {
            const tbody = document.getElementById('inventoryTable');
            if (!tbody) return;

            updateTotals();

            tbody.innerHTML = inventory.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${item.name}</strong></td>
                    <td>${item.quantity}</td>
                    <td>${item.unit}</td>
                    <td>
                        <span class="badge ${item.type === 'موسمي' ? 'badge-purple' : 'badge-success'}">
                            ${item.type || 'عادي'}
                        </span>
                    </td>
                    <td>
                        ${item.quantity <= 5 ? 
                            '<span class="badge badge-danger">منخفض</span>' : 
                            '<span class="badge badge-success">متوفر</span>'}
                    </td>
                    <td>
                        <button class="btn-danger" onclick="deleteItem('${item.id}')" style="padding: 5px 10px;">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');

            renderMovements();
        }

        function updateTotals() {
            document.getElementById('totalItems').innerHTML = inventory.length;
            document.getElementById('totalUnits').innerHTML = inventory.reduce((s, i) => s + i.quantity, 0);
        }

        function renderMovements() {
            const tbody = document.getElementById('movementsTable');
            if (!tbody) return;

            const recent = [...movements].reverse().slice(0, 20);

            tbody.innerHTML = recent.map(m => `
                <tr>
                    <td>${m.date}</td>
                    <td>
                        <span class="badge ${m.type === 'صرف' ? 'badge-warning' : 'badge-success'}">
                            ${m.type}
                        </span>
                    </td>
                    <td>${m.item}</td>
                    <td>${m.quantity}</td>
                    <td>${m.unit}</td>
                    <td>${m.note || ''}</td>
                </tr>
            `).join('');
        }

        function addNewItem() {
            const name = document.getElementById('itemName').value.trim();
            const quantity = parseFloat(document.getElementById('itemQuantity').value);
            const unit = document.getElementById('itemUnit').value;

            if (!name || !quantity) {
                showToast('الرجاء إدخال البيانات', 'warning');
                return;
            }

            const existing = inventory.find(i => i.name === name);
            if (existing) {
                existing.quantity += quantity;
                movements.push({
                    date: new Date().toLocaleDateString(),
                    type: 'إضافة',
                    item: name,
                    quantity: quantity,
                    unit: unit,
                    note: 'إضافة للمخزن'
                });
                showToast(`تم إضافة ${quantity} ${unit} إلى ${name}`);
            } else {
                inventory.push({
                    id: generateId(),
                    name: name,
                    quantity: quantity,
                    unit: unit,
                    type: unit === 'شنطة' ? 'موسمي' : 'عادي'
                });
                movements.push({
                    date: new Date().toLocaleDateString(),
                    type: 'إضافة',
                    item: name,
                    quantity: quantity,
                    unit: unit,
                    note: 'إضافة صنف جديد'
                });
                showToast(`تم إضافة ${name} جديد`);
            }

            saveData();
            renderInventory();
            
            document.getElementById('itemName').value = '';
            document.getElementById('itemQuantity').value = '';
        }

        function deleteItem(id) {
            const item = inventory.find(i => i.id === id);
            if (confirm(`حذف ${item.name}؟`)) {
                inventory = inventory.filter(i => i.id !== id);
                saveData();
                renderInventory();
                showToast(`تم حذف ${item.name}`);
            }
        }

        // ========== دوال المستفيدين ==========
        function renderBeneficiaries(filteredBeneficiaries = null) {
            const grid = document.getElementById('beneficiariesGrid');
            if (!grid) return;

            document.getElementById('totalBeneficiaries').innerHTML = beneficiaries.length;
            document.getElementById('totalHelps').innerHTML = helps.length;

            let list = filteredBeneficiaries || beneficiaries;

            if (list.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 50px;">لا يوجد مستفيدين</div>';
                return;
            }

            grid.innerHTML = list.map(b => {
                const bHelps = helps.filter(h => h.beneficiaryId === b.id);
                const hasHelped = bHelps.length > 0;

                return `
                    <div class="beneficiary-card">
                        <div class="beneficiary-id">${b.id}</div>
                        
                        <div class="beneficiary-header">
                            <span class="beneficiary-name">${b.name}</span>
                            <span class="badge ${b.status === 'critical' ? 'badge-danger' : b.status === 'high' ? 'badge-warning' : 'badge-success'}">
                                ${b.status}
                            </span>
                        </div>
                        
                        <div class="beneficiary-info">
                            <div class="info-row"><i class="fas fa-id-card"></i> ${b.nationalId}</div>
                            <div class="info-row"><i class="fas fa-phone"></i> ${b.phone}</div>
                            <div class="info-row"><i class="fas fa-map-marker-alt"></i> ${b.governorate}</div>
                        </div>

                        <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; margin: 10px 0;">
                            ${b.condition}
                        </div>

                        ${bHelps.length > 0 ? `
                            <div style="margin: 10px 0;">
                                <small>آخر مساعدة: ${bHelps[0].date}</small>
                            </div>
                        ` : ''}

                        <div class="beneficiary-actions">
                            <button class="action-btn" onclick="openHelpModal('${b.id}')" title="صرف مساعدة">
                                <i class="fas fa-gift"></i>
                            </button>
                            <button class="action-btn" onclick="openEditBeneficiaryModal('${b.id}')" title="تعديل">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="action-btn" onclick="deleteBeneficiary('${b.id}')" title="حذف">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function applySearch() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('helpFilter').value;

            let filtered = beneficiaries;

            if (search) {
                filtered = filtered.filter(b => 
                    b.name.includes(search) || 
                    b.governorate.includes(search) || 
                    b.nationalId.includes(search)
                );
            }

            if (filter === 'helped') {
                filtered = filtered.filter(b => helps.some(h => h.beneficiaryId === b.id));
            } else if (filter === 'not-helped') {
                filtered = filtered.filter(b => !helps.some(h => h.beneficiaryId === b.id));
            }

            renderBeneficiaries(filtered);
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('helpFilter').value = 'all';
            renderBeneficiaries();
        }

        // ========== دوال المستفيدين (مودالات) ==========
        function openAddBeneficiaryModal() {
            document.getElementById('modalTitle').innerHTML = 'إضافة مستفيد';
            document.getElementById('beneficiaryId').value = '';
            document.getElementById('beneficiaryName').value = '';
            document.getElementById('beneficiaryNationalId').value = '';
            document.getElementById('beneficiaryPhone').value = '';
            document.getElementById('beneficiaryGovernorate').value = '';
            document.getElementById('beneficiaryAddress').value = '';
            document.getElementById('beneficiaryStatus').value = 'medium';
            document.getElementById('beneficiaryCondition').value = '';
            document.getElementById('beneficiaryNotes').value = '';
            document.getElementById('beneficiaryModal').classList.add('active');
        }

        function openEditBeneficiaryModal(id) {
            const b = beneficiaries.find(b => b.id === id);
            if (!b) return;

            document.getElementById('modalTitle').innerHTML = 'تعديل بيانات';
            document.getElementById('beneficiaryId').value = b.id;
            document.getElementById('beneficiaryName').value = b.name;
            document.getElementById('beneficiaryNationalId').value = b.nationalId;
            document.getElementById('beneficiaryPhone').value = b.phone;
            document.getElementById('beneficiaryGovernorate').value = b.governorate;
            document.getElementById('beneficiaryAddress').value = b.address;
            document.getElementById('beneficiaryStatus').value = b.status;
            document.getElementById('beneficiaryCondition').value = b.condition;
            document.getElementById('beneficiaryNotes').value = b.notes || '';
            document.getElementById('beneficiaryModal').classList.add('active');
        }

        function saveBeneficiary(e) {
            e.preventDefault();

            const id = document.getElementById('beneficiaryId').value;
            const data = {
                name: document.getElementById('beneficiaryName').value,
                nationalId: document.getElementById('beneficiaryNationalId').value,
                phone: document.getElementById('beneficiaryPhone').value,
                governorate: document.getElementById('beneficiaryGovernorate').value,
                address: document.getElementById('beneficiaryAddress').value,
                status: document.getElementById('beneficiaryStatus').value,
                condition: document.getElementById('beneficiaryCondition').value,
                notes: document.getElementById('beneficiaryNotes').value
            };

            if (id) {
                const index = beneficiaries.findIndex(b => b.id === id);
                if (index !== -1) {
                    beneficiaries[index] = { ...beneficiaries[index], ...data };
                    showToast('تم التعديل');
                }
            } else {
                beneficiaries.push({ id: generateId(), ...data });
                showToast('تم الإضافة');
            }

            saveData();
            renderBeneficiaries();
            closeModal('beneficiaryModal');
        }

        function deleteBeneficiary(id) {
            if (confirm('حذف هذا المستفيد؟')) {
                beneficiaries = beneficiaries.filter(b => b.id !== id);
                helps = helps.filter(h => h.beneficiaryId !== id);
                saveData();
                renderBeneficiaries();
                showToast('تم الحذف');
            }
        }

        // ========== دوال المساعدات ==========
        function openHelpModal(beneficiaryId) {
            const beneficiary = beneficiaries.find(b => b.id === beneficiaryId);
            if (!beneficiary) return;

            document.getElementById('helpBeneficiaryId').value = beneficiaryId;
            document.getElementById('helpDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('helpNotes').value = '';

            const container = document.getElementById('helpItemsList');
            
            if (inventory.length === 0) {
                container.innerHTML = '<p style="color: var(--warning);">⚠️ المخزن فارغ</p>';
            } else {
                container.innerHTML = inventory.map(item => `
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px;">
                        <input type="checkbox" id="item_${item.id}" value="${item.id}">
                        <label for="item_${item.id}" style="flex: 1;">
                            ${item.name} 
                            <span style="color: var(--text-secondary);">(المتوفر: ${item.quantity} ${item.unit})</span>
                        </label>
                        <input type="number" id="qty_${item.id}" class="input-3d" placeholder="الكمية" min="1" max="${item.quantity}" style="width: 100px; padding: 8px;">
                    </div>
                `).join('');
            }

            document.getElementById('helpModal').classList.add('active');
        }

        function addHelp(e) {
            e.preventDefault();

            const beneficiaryId = document.getElementById('helpBeneficiaryId').value;
            const date = document.getElementById('helpDate').value;
            const notes = document.getElementById('helpNotes').value;
            const beneficiary = beneficiaries.find(b => b.id === beneficiaryId);

            const selectedItems = [];
            
            // تجميع المواد المختارة
            inventory.forEach(item => {
                const checkbox = document.getElementById(`item_${item.id}`);
                const qtyInput = document.getElementById(`qty_${item.id}`);
                
                if (checkbox && checkbox.checked && qtyInput && qtyInput.value) {
                    const qty = parseFloat(qtyInput.value);
                    if (qty > 0 && qty <= item.quantity) {
                        // خصم الكمية من المخزن
                        item.quantity -= qty;
                        
                        selectedItems.push({
                            id: item.id,
                            name: item.name,
                            quantity: qty,
                            unit: item.unit
                        });
                        
                        // تسجيل الحركة
                        movements.push({
                            date: date,
                            type: 'صرف',
                            item: item.name,
                            quantity: qty,
                            unit: item.unit,
                            note: `صرف لـ ${beneficiary?.name || beneficiaryId}`
                        });
                    }
                }
            });

            if (selectedItems.length > 0) {
                // حفظ المساعدة
                helps.push({
                    id: generateId(),
                    beneficiaryId: beneficiaryId,
                    date: date,
                    items: selectedItems,
                    notes: notes
                });

                saveData();
                renderInventory();
                renderBeneficiaries();
                renderMovements();
                closeModal('helpModal');
                showToast('✅ تم صرف المساعدة');
            } else {
                showToast('⚠️ اختر المواد والكميات', 'warning');
            }
        }

        // ========== دوال عامة ==========
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
            
            if (tab === 'store') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('storeSection').classList.add('active');
                renderInventory();
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('beneficiariesSection').classList.add('active');
                renderBeneficiaries();
            }
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // بدء التشغيل
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            renderInventory();
            renderBeneficiaries();
        });
    </script>
</body>
</html>
