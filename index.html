<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>نظام المحافظ · ٢٨ محفظة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: #f0f7f4;
            min-height: 100vh;
            color: #1e293b;
        }

        /* شريط العنوان */
        .header {
            background: linear-gradient(135deg, #0d9488, #14b8a6);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* إحصائيات سريعة */
        .quick-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: white;
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .stat-box i {
            font-size: 2rem;
            color: #0d9488;
            margin-bottom: 10px;
        }

        .stat-box h3 {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .stat-box .number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #0d9488;
        }

        @media (max-width: 768px) {
            .quick-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* شبكة المحافظ */
        .regions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .region-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .region-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .region-header {
            background: linear-gradient(135deg, #0d9488, #14b8a6);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .region-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .region-title h3 {
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        .region-title p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .region-content {
            padding: 20px;
        }

        /* قائمة الأشخاص */
        .people-list {
            margin: 15px 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .person-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f8fafc;
            border-radius: 15px;
            margin-bottom: 8px;
        }

        .person-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .person-name {
            font-weight: bold;
            color: #1e293b;
        }

        .person-help {
            background: #0d9488;
            color: white;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.8rem;
        }

        .person-actions button {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            margin: 0 5px;
            transition: color 0.3s ease;
        }

        .person-actions button:hover {
            color: #dc2626;
        }

        /* أزرار التحكم */
        .region-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-add {
            background: #e0f2e9;
            color: #0d9488;
        }

        .btn-help {
            background: #0d9488;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(0.95);
        }

        /* المودال */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            color: #0d9488;
        }

        .close-modal {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-modal:hover {
            background: #e2e8f0;
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: bold;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: #0d9488;
        }

        .btn-save {
            width: 100%;
            padding: 15px;
            background: #0d9488;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            border-radius: 50px;
            padding: 15px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 3000;
            animation: slideRight 0.3s ease;
        }

        @keyframes slideRight {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-map-marked-alt"></i> نظام المحافظ · ٢٨ محفظة</h1>
        <p>إدارة المناطق والمستفيدين والمساعدات</p>
    </div>

    <div class="container">
        <!-- إحصائيات سريعة -->
        <div class="quick-stats">
            <div class="stat-box">
                <i class="fas fa-map-marker-alt"></i>
                <h3>إجمالي المحافظ</h3>
                <div class="number" id="totalRegions">٢٨</div>
            </div>
            <div class="stat-box">
                <i class="fas fa-users"></i>
                <h3>إجمالي المستفيدين</h3>
                <div class="number" id="totalPeople">٠</div>
            </div>
            <div class="stat-box">
                <i class="fas fa-gift"></i>
                <h3>إجمالي المساعدات</h3>
                <div class="number" id="totalHelps">٠</div>
            </div>
            <div class="stat-box">
                <i class="fas fa-check-circle"></i>
                <h3>المحافظ النشطة</h3>
                <div class="number" id="activeRegions">٢٨</div>
            </div>
        </div>

        <!-- شبكة المحافظ (المناطق) -->
        <div id="regionsGrid" class="regions-grid"></div>
    </div>

    <!-- مودال إضافة شخص -->
    <div id="addPersonModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-user-plus"></i> إضافة مستفيد جديد</h2>
                <div class="close-modal" onclick="closeModal('addPersonModal')">
                    <i class="fas fa-times"></i>
                </div>
            </div>
            <form onsubmit="addPerson(event)">
                <input type="hidden" id="currentRegionId">
                <div class="form-group">
                    <label>الاسم</label>
                    <input type="text" class="form-control" id="personName" required placeholder="مثال: محمد أحمد">
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="text" class="form-control" id="personPhone" placeholder="٠١٢٣٤٥٦٧٨٩">
                </div>
                <div class="form-group">
                    <label>ملاحظات</label>
                    <textarea class="form-control" id="personNotes" rows="2" placeholder="أي معلومات إضافية..."></textarea>
                </div>
                <button type="submit" class="btn-save">
                    <i class="fas fa-save"></i> حفظ المستفيد
                </button>
            </form>
        </div>
    </div>

    <!-- مودال إضافة مساعدة -->
    <div id="addHelpModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-gift"></i> إضافة مساعدة</h2>
                <div class="close-modal" onclick="closeModal('addHelpModal')">
                    <i class="fas fa-times"></i>
                </div>
            </div>
            <form onsubmit="addHelp(event)">
                <input type="hidden" id="helpRegionId">
                <div class="form-group">
                    <label>المستفيد</label>
                    <select class="form-control" id="helpPersonId" required>
                        <option value="">اختر المستفيد...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>نوع المساعدة</label>
                    <select class="form-control" id="helpType" required>
                        <option value="نقدي">💰 نقدي</option>
                        <option value="غذائي">🍞 غذائي</option>
                        <option value="كسوة">👕 كسوة</option>
                        <option value="علاج">💊 علاج</option>
                        <option value="تعليم">📚 تعليم</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>القيمة (جنيه)</label>
                    <input type="number" class="form-control" id="helpAmount" placeholder="١٠٠٠" required>
                </div>
                <div class="form-group">
                    <label>ملاحظات</label>
                    <textarea class="form-control" id="helpNotes" rows="2" placeholder="تفاصيل المساعدة..."></textarea>
                </div>
                <button type="submit" class="btn-save">
                    <i class="fas fa-gift"></i> تسجيل المساعدة
                </button>
            </form>
        </div>
    </div>

    <script>
        // ==============================================
        // أسماء المناطق (٢٨ محفظة)
        // ==============================================
        const regionNames = [
            "المنطقة الأولى", "المنطقة الثانية", "المنطقة الثالثة", "المنطقة الرابعة",
            "المنطقة الخامسة", "المنطقة السادسة", "المنطقة السابعة", "المنطقة الثامنة",
            "المنطقة التاسعة", "المنطقة العاشرة", "المنطقة الحادية عشرة", "المنطقة الثانية عشرة",
            "المنطقة الثالثة عشرة", "المنطقة الرابعة عشرة", "المنطقة الخامسة عشرة", "المنطقة السادسة عشرة",
            "المنطقة السابعة عشرة", "المنطقة الثامنة عشرة", "المنطقة التاسعة عشرة", "المنطقة العشرون",
            "المنطقة الحادية والعشرون", "المنطقة الثانية والعشرون", "المنطقة الثالثة والعشرون", "المنطقة الرابعة والعشرون",
            "المنطقة الخامسة والعشرون", "المنطقة السادسة والعشرون", "المنطقة السابعة والعشرون", "المنطقة الثامنة والعشرون"
        ];

        // ==============================================
        // البيانات
        // ==============================================
        let regions = [];
        let people = [];
        let helps = [];

        // تهيئة المناطق
        function initRegions() {
            regions = regionNames.map((name, index) => ({
                id: index + 1,
                name: name,
                icon: getRegionIcon(index)
            }));
        }

        // أيقونات مختلفة للمناطق
        function getRegionIcon(index) {
            const icons = ['🏘️', '🏙️', '🌆', '🌇', '🏞️', '🌳', '🏡', '🕌', '⛲', '🏛️', 
                          '🏘️', '🏙️', '🌆', '🌇', '🏞️', '🌳', '🏡', '🕌', '⛲', '🏛️',
                          '🏘️', '🏙️', '🌆', '🌇', '🏞️', '🌳', '🏡', '🕌'];
            return icons[index % icons.length];
        }

        // ==============================================
        // دوال المساعدة
        // ==============================================
        function getPeopleInRegion(regionId) {
            return people.filter(p => p.regionId === regionId);
        }

        function getHelpsCount() {
            return helps.length;
        }

        function getHelpsForPerson(personId) {
            return helps.filter(h => h.personId === personId);
        }

        function getTotalHelpsAmount() {
            return helps.reduce((sum, h) => sum + (h.amount || 0), 0);
        }

        // ==============================================
        // عرض المحافظ
        // ==============================================
        function renderRegions() {
            const grid = document.getElementById('regionsGrid');
            if (!grid) return;

            grid.innerHTML = regions.map(region => {
                const regionPeople = getPeopleInRegion(region.id);
                const peopleCount = regionPeople.length;
                const helpsCount = regionPeople.reduce((sum, p) => sum + getHelpsForPerson(p.id).length, 0);

                return `
                <div class="region-card" data-region-id="${region.id}">
                    <div class="region-header">
                        <div class="region-icon">${region.icon}</div>
                        <div class="region-title">
                            <h3>${region.name}</h3>
                            <p>👥 ${peopleCount} مستفيد | 🎁 ${helpsCount} مساعدة</p>
                        </div>
                    </div>
                    <div class="region-content">
                        <div class="people-list" id="people-${region.id}">
                            ${regionPeople.length > 0 ? regionPeople.map(person => `
                                <div class="person-item">
                                    <div class="person-info">
                                        <span class="person-name">${person.name}</span>
                                        ${getHelpsForPerson(person.id).length > 0 ? 
                                            `<span class="person-help">${getHelpsForPerson(person.id).length}</span>` : ''}
                                    </div>
                                    <div class="person-actions">
                                        <button onclick="showPersonHelps('${person.id}')" title="عرض المساعدات">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                        <button onclick="deletePerson('${person.id}')" title="حذف">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            `).join('') : `
                                <div style="text-align: center; color: #94a3b8; padding: 15px;">
                                    لا يوجد مستفيدين
                                </div>
                            `}
                        </div>
                        <div class="region-actions">
                            <button class="btn btn-add" onclick="openAddPersonModal(${region.id})">
                                <i class="fas fa-user-plus"></i> إضافة مستفيد
                            </button>
                            <button class="btn btn-help" onclick="openAddHelpModal(${region.id})">
                                <i class="fas fa-gift"></i> إضافة مساعدة
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            updateStats();
        }

        // تحديث الإحصائيات
        function updateStats() {
            document.getElementById('totalRegions').innerText = '٢٨';
            document.getElementById('totalPeople').innerText = people.length.toLocaleString('ar-EG');
            document.getElementById('totalHelps').innerText = helps.length.toLocaleString('ar-EG');
            document.getElementById('activeRegions').innerText = '٢٨';
        }

        // تحديث قائمة الأشخاص في منطقة معينة
        function updatePeopleInRegion(regionId) {
            const peopleContainer = document.getElementById(`people-${regionId}`);
            if (!peopleContainer) return;

            const regionPeople = getPeopleInRegion(regionId);
            
            peopleContainer.innerHTML = regionPeople.length > 0 ? regionPeople.map(person => `
                <div class="person-item">
                    <div class="person-info">
                        <span class="person-name">${person.name}</span>
                        ${getHelpsForPerson(person.id).length > 0 ? 
                            `<span class="person-help">${getHelpsForPerson(person.id).length}</span>` : ''}
                    </div>
                    <div class="person-actions">
                        <button onclick="showPersonHelps('${person.id}')" title="عرض المساعدات">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button onclick="deletePerson('${person.id}')" title="حذف">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('') : `
                <div style="text-align: center; color: #94a3b8; padding: 15px;">
                    لا يوجد مستفيدين
                </div>
            `;

            updateStats();
        }

        // تحديث قائمة المستفيدين في مودال المساعدة
        function updateHelpPersonSelect(regionId) {
            const select = document.getElementById('helpPersonId');
            const regionPeople = getPeopleInRegion(regionId);
            
            select.innerHTML = '<option value="">اختر المستفيد...</option>' + 
                regionPeople.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        }

        // ==============================================
        // العمليات الرئيسية
        // ==============================================
        function openAddPersonModal(regionId) {
            document.getElementById('currentRegionId').value = regionId;
            document.getElementById('addPersonModal').classList.add('active');
        }

        function openAddHelpModal(regionId) {
            document.getElementById('helpRegionId').value = regionId;
            updateHelpPersonSelect(regionId);
            document.getElementById('addHelpModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function addPerson(e) {
            e.preventDefault();
            
            const regionId = parseInt(document.getElementById('currentRegionId').value);
            const name = document.getElementById('personName').value;
            const phone = document.getElementById('personPhone').value;
            const notes = document.getElementById('personNotes').value;

            const newPerson = {
                id: Date.now().toString(),
                regionId: regionId,
                name: name,
                phone: phone,
                notes: notes,
                date: new Date().toISOString().split('T')[0]
            };

            people.push(newPerson);
            updatePeopleInRegion(regionId);
            
            closeModal('addPersonModal');
            e.target.reset();
            showToast('✅ تم إضافة المستفيد بنجاح');
        }

        function addHelp(e) {
            e.preventDefault();
            
            const regionId = parseInt(document.getElementById('helpRegionId').value);
            const personId = document.getElementById('helpPersonId').value;
            const type = document.getElementById('helpType').value;
            const amount = parseFloat(document.getElementById('helpAmount').value);
            const notes = document.getElementById('helpNotes').value;

            const newHelp = {
                id: Date.now().toString(),
                personId: personId,
                regionId: regionId,
                type: type,
                amount: amount,
                notes: notes,
                date: new Date().toISOString().split('T')[0]
            };

            helps.push(newHelp);
            updatePeopleInRegion(regionId);
            
            closeModal('addHelpModal');
            e.target.reset();
            showToast('✅ تم تسجيل المساعدة بنجاح');
        }

        function deletePerson(personId) {
            if (confirm('⚠️ هل أنت متأكد من حذف هذا المستفيد؟')) {
                const person = people.find(p => p.id === personId);
                if (person) {
                    const regionId = person.regionId;
                    people = people.filter(p => p.id !== personId);
                    helps = helps.filter(h => h.personId !== personId);
                    updatePeopleInRegion(regionId);
                    showToast('✅ تم حذف المستفيد وجميع مساعداته');
                }
            }
        }

        function showPersonHelps(personId) {
            const person = people.find(p => p.id === personId);
            const personHelps = helps.filter(h => h.personId === personId);
            
            if (personHelps.length === 0) {
                alert(`📋 لا توجد مساعدات لـ ${person.name}`);
                return;
            }

            let message = `📋 مساعدات ${person.name}:\n\n`;
            personHelps.forEach(h => {
                message += `📅 ${h.date}\n`;
                message += `🎁 ${h.type}: ${h.amount} جنيه\n`;
                if (h.notes) message += `📝 ${h.notes}\n`;
                message += '─'.repeat(20) + '\n';
            });

            alert(message);
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-check-circle" style="color: #0d9488"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ==============================================
        // بدء التشغيل
        // ==============================================
        document.addEventListener('DOMContentLoaded', () => {
            initRegions();
            renderRegions();

            // إغلاق المودال عند الضغط خارجها
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) modal.classList.remove('active');
                });
            });
        });
    </script>
</body>
</html>
